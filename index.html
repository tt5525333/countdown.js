<body>
  <div class="cta-wrap">
    <a
      class="cta-link"
      href="https://flipedu.parenting.com.tw/college/course/23"
      target="_blank"
      rel="noopener noreferrer"
    >
      36折早鳥倒數限時優惠！立即購買
    </a>

    <div class="countdown" id="countdownTimer">
      <span id="cdDays">00</span>
      <span> 天 </span>
      <span id="cdHours">00</span>
      <span> 時 </span>
      <span id="cdMinutes">00</span>
      <span> 分 </span>
      <span id="cdSeconds">00</span>
      <span> 秒</span>
    </div>
  </div>

  <script>
    (function () {
      var deadline = new Date("2026-08-01T00:00:00+08:00").getTime();
      var countdownInterval;

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function updateCountdown() {
        var distance = deadline - Date.now();
        var timerEl = document.getElementById("countdownTimer");

        if (distance <= 0) {
          timerEl.textContent = "優惠已結束";
          clearInterval(countdownInterval);
          return;
        }

        var days = Math.floor(distance / 86400000);
        var hours = Math.floor((distance % 86400000) / 3600000);
        var minutes = Math.floor((distance % 3600000) / 60000);
        var seconds = Math.floor((distance % 60000) / 1000);

        document.getElementById("cdDays").textContent = pad(days);
        document.getElementById("cdHours").textContent = pad(hours);
        document.getElementById("cdMinutes").textContent = pad(minutes);
        document.getElementById("cdSeconds").textContent = pad(seconds);
      }

      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    })();
  </script>
</body>
