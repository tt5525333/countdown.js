<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Countdown CTA Demo</title>
</head>
<body>
  <div class="fix-bottom" style="display:flex; flex-direction:column; justify-content:center; align-items:center; position:fixed !important; bottom:0 !important; left:0 !important; right:0 !important; z-index:99999 !important; background:#EF7161; width:100%; min-height:104px; padding:18px 70px 20px; box-sizing:border-box; text-align:center; color:#fff; border-radius:0;">
    <a href="https://flipedu.parenting.com.tw/college/course/23" target="_blank" rel="noopener noreferrer" style="display:inline-block; color:#fff; font-weight:700; font-size:28px; line-height:34px; text-decoration:none; letter-spacing:1px;">
      27折超早鳥限時優惠！立即購買
    </a>

    <div id="countdownTimer" style="margin-top:6px; color:#fff; font-size:18px; line-height:24px; font-weight:400; letter-spacing:1px;">
      <span id="cdDays" style="display:inline-block;">00</span>
      <span style="display:inline-block;"> 天 </span>
      <span id="cdHours" style="display:inline-block;">00</span>
      <span style="display:inline-block;"> 時 </span>
      <span id="cdMinutes" style="display:inline-block;">00</span>
      <span style="display:inline-block;"> 分 </span>
      <span id="cdSeconds" style="display:inline-block;">00</span>
      <span style="display:inline-block;"> 秒</span>
    </div>
  </div>

  <script src="./countdown.js"></script>
</body>
</html>
