<!DOCTYPE html> <html lang="zh-Hant"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Countdown CTA</title> <style> html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #EF7161; font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif; } .cta-wrap { width: 100%; height: 104px; background: #EF7161; color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; padding: 14px 20px 16px; text-align: center; } .cta-link { display: block; color: #ffffff; text-decoration: none; font-weight: 700; font-size: clamp(18px, 4.5vw, 28px); line-height: 1.25; letter-spacing: 0.04em; max-width: 100%; white-space: nowrap; } .countdown { margin-top: 6px; font-size: clamp(15px, 3.8vw, 22px); line-height: 1.3; font-weight: 400; letter-spacing: 0.06em; white-space: nowrap; } .countdown span { display: inline-block; } @media (max-width: 480px) { .cta-wrap { height: 82px; padding: 10px 8px 12px; } .cta-link { font-size: clamp(17px, 5.2vw, 22px); line-height: 1.25; letter-spacing: 0.02em; } .countdown { margin-top: 4px; font-size: clamp(14px, 4.4vw, 18px); line-height: 1.25; letter-spacing: 0.03em; } } @media (max-width: 360px) { .cta-wrap { height: 78px; padding: 8px 6px 10px; } .cta-link { font-size: 18px; letter-spacing: 0; } .countdown { font-size: 15px; letter-spacing: 0; } } </style> </head> <body> <div class="cta-wrap"> <a class="cta-link" href="https://flipedu.parenting.com.tw/college/course/23" target="_blank" rel="noopener noreferrer" > 36折早鳥限時優惠！立即購買 </a> <div class="countdown"> <span id="cdDays">00</span> <span> 天 </span> <span id="cdHours">00</span> <span> 時 </span> <span id="cdMinutes">00</span> <span> 分 </span> <span id="cdSeconds">00</span> <span> 秒</span> </div> </div> <script> (function () { var deadline = new Date("2026-08-01T00:00:00+08:00").getTime(); function pad(value) { return String(value).padStart(2, "0"); } function updateCountdown() { var now = Date.now(); var distance = Math.max(deadline - now, 0); var days = Math.floor(distance / 86400000); var hours = Math.floor((distance / 3600000) % 24); var minutes = Math.floor((distance / 60000) % 60); var seconds = Math.floor((distance / 1000) % 60); document.getElementById("cdDays").textContent = pad(days); document.getElementById("cdHours").textContent = pad(hours); document.getElementById("cdMinutes").textContent = pad(minutes); document.getElementById("cdSeconds").textContent = pad(seconds); } updateCountdown(); setInterval(updateCountdown, 1000); })(); </script> </body> </html>
