<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown CTA</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #EF7161;
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    .cta-wrap {
      width: 100%;
      height: 104px;
      background-color: #EF7161;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      padding: 14px 20px 16px;
      text-align: center;
    }

    .cta-link,
    .cta-link:link,
    .cta-link:visited,
    .cta-link:hover,
    .cta-link:active {
      display: block;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: clamp(18px, 4.5vw, 28px);
      line-height: 1.25;
      letter-spacing: 0.04em;
      max-width: 100%;
      white-space: nowrap;
    }

    .countdown {
      margin-top: 6px;
      color: #ffffff;
      font-size: clamp(15px, 3.8vw, 22px);
      line-height: 1.3;
      font-weight: 400;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .countdown span {
      display: inline-block;
    }

    @media (max-width: 480px) {
      .cta-wrap {
        height: 82px;
        padding: 10px 8px 12px;
      }

      .cta-link,
      .cta-link:link,
      .cta-link:visited,
      .cta-link:hover,
      .cta-link:active {
        font-size: clamp(17px, 5.2vw, 22px);
        line-height: 1.25;
        letter-spacing: 0.02em;
      }

      .countdown {
        margin-top: 4px;
        font-size: clamp(14px, 4.4vw, 18px);
        line-height: 1.25;
        letter-spacing: 0.03em;
      }
    }

    @media (max-width: 360px) {
      .cta-wrap {
        height: 78px;
        padding: 8px 6px 10px;
      }

      .cta-link,
      .cta-link:link,
      .cta-link:visited,
      .cta-link:hover,
      .cta-link:active {
        font-size: 18px;
        letter-spacing: 0;
      }

      .countdown {
        font-size: 15px;
        letter-spacing: 0;
      }
    }
  </style>
</head>

<body>
  <div class="cta-wrap">
    <a
      class="cta-link"
      href="https://flipedu.parenting.com.tw/college/course/23"
      target="_blank"
      rel="noopener noreferrer"
    >
      36折早鳥倒數限時優惠！立即購買
    </a>

    <div class="countdown" id="countdownTimer">
      <span id="cdDays">00</span>
      <span> 天 </span>
      <span id="cdHours">00</span>
      <span> 時 </span>
      <span id="cdMinutes">00</span>
      <span> 分 </span>
      <span id="cdSeconds">00</span>
      <span> 秒</span>
    </div>
  </div>

  <script>
    (function () {
      var deadline = new Date("2026-08-01T00:00:00+08:00").getTime();
      var countdownInterval = null;

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function updateCountdown() {
        var distance = deadline - Date.now();

        var timerEl = document.getElementById("countdownTimer");
        var daysEl = document.getElementById("cdDays");
        var hoursEl = document.getElementById("cdHours");
        var minutesEl = document.getElementById("cdMinutes");
        var secondsEl = document.getElementById("cdSeconds");

        if (
          !timerEl ||
          !daysEl ||
          !hoursEl ||
          !minutesEl ||
          !secondsEl
        ) {
          return;
        }

        if (distance <= 0) {
          timerEl.textContent = "優惠已結束";

          if (countdownInterval !== null) {
            clearInterval(countdownInterval);
          }

          return;
        }

        var days = Math.floor(distance / 86400000);
        var hours = Math.floor((distance % 86400000) / 3600000);
        var minutes = Math.floor((distance % 3600000) / 60000);
        var seconds = Math.floor((distance % 60000) / 1000);

        daysEl.textContent = pad(days);
        hoursEl.textContent = pad(hours);
        minutesEl.textContent = pad(minutes);
        secondsEl.textContent = pad(seconds);
      }

      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    })();
  </script>
</body>
</html>
